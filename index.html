<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu điểm thi</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #0F172A;
            --surface: #1E293B;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --error: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.875rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818CF8, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: none;
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #result-container {
            margin-top: 2rem;
            display: none;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
            animation: fadeIn 0.3s ease-out;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .result-value {
            font-weight: 600;
        }

        .error-message {
            color: var(--error);
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tra cứu điểm</h1>
        
        <form id="search-form">
            <div class="form-group">
                <label for="sbd">Số Báo Danh</label>
                <input type="text" id="sbd" placeholder="Nhập số báo danh (VD: 560403)" required autocomplete="off">
            </div>
            
            <button type="submit" id="submit-btn">
                <span id="btn-text">Tra Cứu</span>
                <div class="loading-spinner" id="spinner"></div>
            </button>
        </form>

        <div id="error-msg" class="error-message"></div>

        <div id="result-container">
            <!-- Kết quả sẽ được render ở đây -->
        </div>
    </div>

    <script>
        const form = document.getElementById('search-form');
        const sbdInput = document.getElementById('sbd');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        const resultContainer = document.getElementById('result-container');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const sbd = sbdInput.value.trim();
            if (!sbd) return;

            // Reset UI
            errorMsg.style.display = 'none';
            resultContainer.style.display = 'none';
            resultContainer.innerHTML = '';
            
            // Loading state
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch('https://tracuudiemnb.ninhbinh.edu.vn/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ so_bao_danh: sbd })
                });

                if (!response.ok) {
                    throw new Error('Lỗi kết nối đến máy chủ.');
                }

                const data = await response.json();

                if (data && Object.keys(data).length > 0 && !data.error) {
                    renderResult(data);
                } else {
                    showError('Không tìm thấy kết quả cho số báo danh này.');
                }
            } catch (error) {
                console.error(error);
                showError('Có lỗi xảy ra hoặc hệ thống đang bảo trì. Vui lòng thử lại sau.');
            } finally {
                // Reset loading state
                btnText.style.display = 'block';
                spinner.style.display = 'none';
                submitBtn.disabled = false;
            }
        });

        function renderResult(data) {
            resultContainer.innerHTML = '';
            
            // Render all key-values from API response dynamically
            // Assuming data is an object with subject scores
            const itemObj = data.data || data; 
            // Handle if data is nested inside "data" property

            const keysToIgnore = ['id', 'created_at', 'updated_at'];
            
            let html = '<h3 style="margin-bottom: 1rem; color: #818CF8;">Kết quả thi:</h3>';
            
            // Assuming it returns an array or single object
            const resultData = Array.isArray(itemObj) ? itemObj[0] : itemObj;

            if (!resultData) {
                showError('Không tìm thấy kết quả.');
                return;
            }

            for (const [key, value] of Object.entries(resultData)) {
                if (keysToIgnore.includes(key.toLowerCase())) continue;
                
                // Format key nicely if needed
                const formattedKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

                html += `
                    <div class="result-item">
                        <span class="result-label">${formattedKey}</span>
                        <span class="result-value">${value !== null ? value : '-'}</span>
                    </div>
                `;
            }

            resultContainer.innerHTML = html;
            resultContainer.style.display = 'block';
        }

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
